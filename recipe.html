<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>מתכון — סבא איציק אופה</title>
  <script>
    // Redirect old recipe.html?id=N URLs to index.html#recipe/N
    const id = new URLSearchParams(window.location.search).get("id");
    if (id) {
      window.location.replace("index.html#recipe/" + id);
    } else {
      window.location.replace("index.html");
    }
  </script>
</head>
<body></body>
</html>
